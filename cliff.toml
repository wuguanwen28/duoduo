# git-cliff 配置：读 git 历史里的 conventional commits，自动生成分类更新日志。
# 本地：git cliff -o CHANGELOG.md  （需先 cargo install git-cliff）
# CI：发 v* 标签时由 GitHub Actions 自动生成本次发行说明（见 .github/workflows/release.yml）。

[changelog]
# 文件头（CHANGELOG.md 顶部说明）。
header = """
# 更新日志

本项目所有重要变更都记录在此文件。版本号遵循语义化版本。
"""
# 每个版本段落的模板（Tera 语法）。
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [未发布]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | split(pat=":") | last | trim | upper_first }}
{% endfor %}\
{% endfor %}
"""
trim = true

[git]
# 启用 conventional commits 解析（feat:/fix:/... ）。
conventional_commits = true
# 过滤掉不符合 "类型: 描述" 格式的提交（如纯中文无前缀的老提交）。
filter_unconventional = true
split_commits = false
# 从上到下第一个匹配生效。本日志面向终端用户，只展示用户有感的变化：
# 新功能 / 修复 / 性能。其余（重构、文档、样式、测试、构建、CI、杂项、
# 无前缀提交）全部 skip，不进 CHANGELOG。
commit_parsers = [
  # 提交正文带 footer「changelog: ignore」的，直接跳过、不进 CHANGELOG。
  # 放在最前面，保证优先于下方所有分组规则命中。
  { footer = "^changelog: ?ignore", skip = true },
  # —— 保留：用户关心的三类 ——
  { message = "^feat", group = "✨ 新功能" },
  { message = "^fix", group = "🐛 修复" },
  { message = "^perf", group = "⚡ 性能" },
  # —— 跳过：内部改动，用户无感 ——
  { message = "^refactor", skip = true },
  { message = "^docs", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
  { message = "^chore", skip = true },
  # 其余无前缀 / 不规范提交也一并跳过，避免流水账。
  { message = ".*", skip = true },
]
filter_commits = false
# 只把形如 v1.2.3 的标签当作版本。
tag_pattern = "v[0-9]*"
sort_commits = "newest"
